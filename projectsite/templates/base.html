{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>{% block title %}PSUSphere 2.0{% endblock %}</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no' name='viewport' />
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i">
    <link rel="stylesheet" href="{% static 'css/ready.css' %}">
    <link rel="stylesheet" href="https://maxst.icons8.com/openapi/itools/bundle/1.1.0/line-awesome/font-awesome-line-awesome/css/all.min.css">
    
    <style>
        /* Steady Sidebar Styles */
        .sidebar {
            position: fixed !important;
            top: 60px;
            bottom: 0;
            left: 0;
            width: 250px;
            z-index: 1000;
            overflow-y: auto;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        /* Pulls the menu items much higher */
        .sidebar .sidebar-wrapper {
            padding-top: 0px !important; /* Removes the large top gap */
        }

        .sidebar .user {
            margin-top: 5px !important; /* Moves the profile pic closer to the logo */
            padding-bottom: 10px !important;
            margin-bottom: 0px !important;
            border-bottom: 1px solid #f1f1f1;
        }

        .sidebar .nav {
            margin-top: 0px !important; /* Menu starts immediately after user info */
        }

        .main-panel {
            margin-left: 250px; 
            min-height: 100vh;
        }

        /* Mobile Adjustments */
        @media (max-width: 991px) {
            .sidebar { margin-left: -250px; }
            .main-panel { margin-left: 0; }
        }

        /* Upgrade Button Styles */
        .nav-item.update-pro button {
            background-color: #1d7af3 !important;
            border: none !important;
            width: 90% !important;
            margin: 15px auto !important;
            display: block !important;
            padding: 10px !important;
            border-radius: 5px !important;
            color: white !important;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="main-header">
            <div class="logo-header">
                <a href="/" class="logo">PSUSphere 2.0</a>
                <button class="navbar-toggler sidenav-toggler ml-auto" type="button" data-toggle="collapse" data-target="collapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <button class="topbar-toggler more"><i class="la la-ellipsis-v"></i></button>
            </div>
            <nav class="navbar navbar-header navbar-expand-lg">
                <div class="container-fluid">
                    <ul class="navbar-nav topbar-nav ml-md-auto align-items-center">
                        <li class="nav-item dropdown">
                            <a class="dropdown-toggle profile-pic" data-toggle="dropdown" href="#">
                                <img src="{% static 'img/profile.jpg' %}" alt="user-img" width="36" class="img-circle">
                                <span>Admin</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>

        <div class="sidebar">
            <div class="scrollbar-inner sidebar-wrapper">
                <div class="user">
                    <div class="photo">
                        <img src="{% static 'img/profile.jpg' %}"> 
                    </div>
                    <div class="info">
                        <a data-toggle="collapse" href="#collapseExample" aria-expanded="true">
                            <span>Hizrian <span class="user-level">Administrator</span><span class="caret"></span></span>
                        </a>
                    </div>
                </div>

                <ul class="nav">
                    <li class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                        <a href="{% url 'home' %}">
                            <i class="la la-dashboard"></i>
                            <p>Dashboard</p>
                            <span class="badge badge-count">5</span>
                        </a>
                    </li>
                    <li class="nav-item {% if 'organization' in request.resolver_match.url_name %}active{% endif %}">
                        <a href="{% url 'organization-list' %}">
                            <i class="la la-graduation-cap"></i>
                            <p>Organization</p>
                            <span class="badge badge-count">14</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <i class="la la-users"></i>
                            <p>Org. Members</p>
                            <span class="badge badge-count">50</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <i class="la la-user"></i>
                            <p>Student</p>
                            <span class="badge badge-count">6</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <i class="la la-university"></i>
                            <p>College</p>
                            <span class="badge badge-success">3</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="main-panel">
            <div class="content">
                <div class="container-fluid">
                    {% block content %}{% endblock %}
                </div>
            </div>
            <footer class="footer">
                <div class="container-fluid">
                    <div class="copyright ml-auto">2026, PSUSphere 2.0</div>              
                </div>
            </footer>
        </div>
    </div>
</body>
<script src="{% static 'js/core/jquery.3.2.1.min.js' %}"></script>
<script src="{% static 'js/core/popper.min.js' %}"></script>
<script src="{% static 'js/core/bootstrap.min.js' %}"></script>
<script src="{% static 'js/ready.min.js' %}"></script>
</html>
